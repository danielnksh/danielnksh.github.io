<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daniel Nksh</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      flex-direction: column;
      gap: 32px;
    }

    img {
      width: 200px;
    }

    a.portfolio-btn {
      background-color: #89CFF0;
      color: #ffffff;
      text-decoration: none;
      padding: 14px 40px;
      border-radius: 8px;
      font-size: 18px;
      font-family: sans-serif;
      font-weight: 600;
      letter-spacing: 1px;
      transition: background-color 0.2s;
    }

    a.portfolio-btn:hover {
      background-color: #60b8e0;
    }
  </style>
</head>
<body>
  <img src="DN.png" alt="DN Logo">
  <a class="portfolio-btn" href="portfolio.html">Portfolio</a>
</body>
</html>
